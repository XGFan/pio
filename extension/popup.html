<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>PIO Proxy Switcher</title>
  </head>
  <body>
    <header class="topbar">
      <h1>PIO Proxy</h1>
      <span id="status-pill" class="pill pill-direct">Off</span>
    </header>

    <!-- Active state: which proxy is in effect, plus a one-click Disable. -->
    <section class="active-bar">
      <div class="active-info">
        <span class="active-label">Current</span>
        <span id="active-name" class="active-name">Disabled</span>
      </div>
      <button id="btn-direct" class="btn btn-ghost" type="button" hidden>Disable</button>
    </section>

    <!-- Single subscription URL: this field adds it, or replaces the existing one. -->
    <section class="sub-form">
      <form id="add-form" autocomplete="off">
        <input
          id="sub-url"
          class="input"
          type="url"
          placeholder="PIO subscription URL"
          required
        />
        <button class="btn btn-primary" type="submit">Save</button>
      </form>
      <p id="add-error" class="error" hidden></p>
    </section>

    <main id="subs" class="subs"></main>

    <template id="proxy-template">
      <li class="proxy" data-proxy>
        <button class="proxy-btn" type="button">
          <span class="proxy-name" data-name></span>
          <span class="check" data-check>✓</span>
        </button>
      </li>
    </template>

    <script type="module" src="popup.js"></script>
  </body>
</html>
