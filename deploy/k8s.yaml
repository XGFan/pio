# Canonical Kubernetes manifest for the pio service.
#
# Applied by .woodpecker.yaml (kubectl apply -f deploy/k8s.yaml) on every
# push to master, followed by `kubectl set image` to roll the freshly-built
# tag onto the Deployment. Edit this file when you need to change ports,
# env vars, the LoadBalancer Service, ingress, or storage — `set image` only
# updates the image, never the spec.
#
# Mirrored at infra/k8s/pio/pio.yaml for cross-repo discoverability;
# this file is the source of truth (CI applies it).
#
# NOTE: object names were renamed webshare* -> pio*. The live data PVC was
# migrated webshare-data -> pio-data out-of-band (see deploy/MIGRATION.md);
# the crypto AAD stays "webshare-proxy/v1/" so the copied data.db decrypts.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pio-data
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pio
  namespace: default
  labels:
    app: pio
spec:
  replicas: 1
  # SQLite 单写者：升级时先停旧 Pod 再起新 Pod，避免抢占 RWO PVC。
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pio
  template:
    metadata:
      labels:
        app: pio
    spec:
      securityContext:
        # Container runs as uid 1000 (alpine appuser). Longhorn-provisioned
        # PVCs default to root ownership; fsGroup retitles the mount so the
        # non-root process can write master.key / SQLite files into /data.
        fsGroup: 1000
      containers:
        - name: pio
          image: docker.test4x.com/xgfan/pio:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 9090
            - name: proxy
              containerPort: 8080
          env:
            # 登陆走集群 tinyauth(Traefik forwardAuth)：信任其回注的 Remote-Email
            # 头,面板自身不再做密码挑战(免双重登陆)。要切回自带密码登陆,删掉这行
            # (或设回 "password") 即可,PIO_WEB_PASSWORD 仍是密码模式的兜底。
            # 注意:本机制只在「面板仅经 Traefik 可达」时安全 —— pio Service 是
            # ClusterIP(仅 ingress 可达),对外的 9090 没有任何旁路;代理端口 8080
            # 走独立的 pio-proxy LoadBalancer,与此无关。
            # 若改用没有 email 的 tinyauth 本地用户兜底,需加 PIO_WEB_AUTH_HEADER=Remote-User。
            - name: PIO_WEB_AUTH_MODE
              value: "forward-auth"
            - name: PIO_WEB_PASSWORD
              value: "password"
            # 强制代理监听 0.0.0.0，使 MetalLB Service 能转发到 Pod。
            # 每次启动覆写 DB 中持久化的 bind，Web UI 与实际一致。
            - name: PIO_PROXY_BIND
              value: "0.0.0.0"
            # Pod 起来后自动开代理；UI 上手动停了之后重启 Pod 仍会再起。
            - name: PIO_PROXY_AUTOSTART
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
      imagePullSecrets:
        - name: regcred
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pio-data
---
apiVersion: v1
kind: Service
metadata:
  name: pio
  namespace: default
spec:
  selector:
    app: pio
  ports:
    - port: 80
      targetPort: 9090
---
# 通过 MetalLB 把代理暴露到 LAN。
# IP 192.168.2.241 取自 lan-pool (240-250)，不与 Traefik (.231) /
# 数据库 (.240) 冲突。LAN 客户端统一使用 192.168.2.241:8080 接入（HTTP 与
# SOCKS5 协议自动识别）；UI 仍然走 https://pio.test4x.com。
apiVersion: v1
kind: Service
metadata:
  name: pio-proxy
  namespace: default
  annotations:
    metallb.io/loadBalancerIPs: 192.168.2.241
spec:
  type: LoadBalancer
  selector:
    app: pio
  ports:
    - name: proxy
      protocol: TCP
      port: 8080
      targetPort: 8080
---
# 公开订阅端点：机器消费(Chrome 扩展/代理自动配置)，靠 ?password= 鉴权，不能挂
# tinyauth(否则会被弹到 passkey 登陆页而崩)。单独一个 ingress 只暴露 /subscription，
# 不挂 tinyauth。显式设 router.priority 高于下面 pio(/) 的默认值(按规则长度计,约 40),
# 确保 /subscription 命中本路由、绕开登陆校验 —— 不依赖 Traefik 的长度排序默认行为。
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pio-public
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: cf-dns-issuer
    traefik.ingress.kubernetes.io/router.priority: "100"
    traefik.ingress.kubernetes.io/router.middlewares: default-redirect@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - pio.test4x.com
      secretName: wildcard-test4x-com-tls
  rules:
    - host: pio.test4x.com
      http:
        paths:
          - path: /subscription
            pathType: Prefix
            backend:
              service:
                name: pio
                port:
                  number: 80
---
# 管理面板：其余全部路径，挂 tinyauth 登陆校验(forwardAuth)。中间件按顺序执行,
# redirect 在前(http→https),tinyauth 在后(鉴权)。tinyauth 通过后回注 Remote-Email,
# PIO 以 forward-auth 模式信任之(见 Deployment env)。
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pio
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: cf-dns-issuer
    traefik.ingress.kubernetes.io/router.middlewares: default-redirect@kubernetescrd,default-tinyauth@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - pio.test4x.com
      secretName: wildcard-test4x-com-tls
  rules:
    - host: pio.test4x.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pio
                port:
                  number: 80
