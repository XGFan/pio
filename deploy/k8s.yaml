# Canonical Kubernetes manifest for the pia service.
#
# Applied by .woodpecker.yaml (kubectl apply -f deploy/k8s.yaml) on every
# push to master, followed by `kubectl set image` to roll the freshly-built
# tag onto the Deployment. Edit this file when you need to change ports,
# env vars, the LoadBalancer Service, ingress, or storage — `set image` only
# updates the image, never the spec.
#
# Mirrored at infra/k8s/pia/pia.yaml for cross-repo discoverability;
# this file is the source of truth (CI applies it).
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pia-data
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pia
  namespace: default
  labels:
    app: pia
spec:
  replicas: 1
  # SQLite 单写者：升级时先停旧 Pod 再起新 Pod，避免抢占 RWO PVC。
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pia
  template:
    metadata:
      labels:
        app: pia
    spec:
      securityContext:
        # Container runs as uid 1000 (alpine appuser). Longhorn-provisioned
        # PVCs default to root ownership; fsGroup retitles the mount so the
        # non-root process can write master.key / SQLite files into /data.
        fsGroup: 1000
      containers:
        - name: pia
          image: docker.test4x.com/xgfan/pia:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 9090
            - name: proxy
              containerPort: 8080
          env:
            - name: PIA_WEB_PASSWORD
              value: "password"
            # 强制代理监听 0.0.0.0，使 MetalLB Service 能转发到 Pod。
            # 每次启动覆写 DB 中持久化的 bind，Web UI 与实际一致。
            - name: PIA_PROXY_BIND
              value: "0.0.0.0"
            # Pod 起来后自动开代理；UI 上手动停了之后重启 Pod 仍会再起。
            - name: PIA_PROXY_AUTOSTART
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
      imagePullSecrets:
        - name: regcred
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pia-data
---
apiVersion: v1
kind: Service
metadata:
  name: pia
  namespace: default
spec:
  selector:
    app: pia
  ports:
    - port: 80
      targetPort: 9090
---
# 通过 MetalLB 把代理暴露到 LAN。
# IP 192.168.2.241 取自 lan-pool (240-250)，不与 Traefik (.231) /
# 数据库 (.240) 冲突。LAN 客户端统一使用 192.168.2.241:8080 接入（HTTP 与
# SOCKS5 协议自动识别）；UI 仍然走 https://pia.test4x.com。
apiVersion: v1
kind: Service
metadata:
  name: pia-proxy
  namespace: default
  annotations:
    metallb.io/loadBalancerIPs: 192.168.2.241
spec:
  type: LoadBalancer
  selector:
    app: pia
  ports:
    - name: proxy
      protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pia
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: cf-dns-issuer
    traefik.ingress.kubernetes.io/router.middlewares: default-redirect@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - pia.test4x.com
      secretName: wildcard-test4x-com-tls
  rules:
    - host: pia.test4x.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pia
                port:
                  number: 80
